apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: {{ .Values.mcpServer.image }}
          ports:
            - containerPort: {{ .Values.mcpServer.port }}
          env:
            - name: API_URL
              value: "http://backend:{{ .Values.backend.port }}/api/product"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
spec:
  selector:
    app: mcp-server
  ports:
    - port: {{ .Values.mcpServer.port }}
      targetPort: {{ .Values.mcpServer.port }}
