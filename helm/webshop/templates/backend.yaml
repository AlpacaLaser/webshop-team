apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: MongoDB__ConnectionString
              value: {{ .Values.mongodbConnectionString }}
            - name: MongoDB__DatabaseName
              value: {{ .Values.mongodbDatabaseName }}
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.backend.port }}"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
