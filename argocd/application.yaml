apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webshop-team
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AlpacaLaser/webshop-team.git
    targetRevision: HEAD
    path: helm/webshop
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: webshop

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
