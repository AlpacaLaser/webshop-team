apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/alpacalaser/webshop-team-backend:latest
          ports:
            - containerPort: 5151
          env:
            - name: MongoDB__ConnectionString
              value: "mongodb://mongodb:27017"
            - name: MongoDB__DatabaseName
              value: "webshop"
            - name: ASPNETCORE_URLS
              value: "http://+:5151"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 5151
      targetPort: 5151
