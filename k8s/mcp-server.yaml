apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: ghcr.io/alpacalaser/webshop-team-mcp-server:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: "http://backend:5151/api/product"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
spec:
  selector:
    app: mcp-server
  ports:
    - port: 3000
      targetPort: 3000
