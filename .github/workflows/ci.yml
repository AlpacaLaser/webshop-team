name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/Webshop.API
          file: ./backend/Webshop.API/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/webshop-team-backend:latest

      - name: Build and push frontend
        if: false   # TODO: enable when frontend Dockerfile exists
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/webshop-team-frontend:latest

      - name: Build and push mcp-server
        if: false   # TODO: enable when mcp-server Dockerfile exists
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/webshop-team-mcp-server:latest