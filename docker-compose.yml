services:
  # MongoDB adatb�zis
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - webshop-network

  # Backend
  backend:
    build: ./backend
    ports:
      - "5151:5151"
    environment:
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=webshop
      - ASPNETCORE_URLS=http://+:5151
    depends_on:
      - mongodb
    networks:
      - webshop-network

  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - webshop-network

  # MCP szerver
  mcp-server:
    build: ./mcp-server
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:5151/api/product
    depends_on:
      - backend
    networks:
      - webshop-network

volumes:
  mongodb-data:


networks:
  webshop-network:
    driver: bridge
